<p-toast />
<p-confirmDialog />

<div class="page-container">

  <div class="page-header">
    <div>
      <h2>Avaliações</h2>
      <p>Registre e acompanhe as avaliações físicas</p>
    </div>
    <p-button label="Nova Avaliação" icon="pi pi-plus" routerLink="/avaliacoes/nova" />
  </div>

  <div class="card">
    <div class="table-toolbar">
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input
          pInputText
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Buscar por aluno..." />
      </p-iconfield>
      <p-select
        [options]="statusOptions"
        [(ngModel)]="statusFilter"
        optionLabel="label"
        optionValue="value"
        placeholder="Filtrar status" />
    </div>

    <p-table
      [value]="filteredAvaliacoes"
      [paginator]="true"
      [rows]="10"
      [tableStyle]="{ 'min-width': '100%' }"
      styleClass="p-datatable-gridlines">

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="alunoNome">Aluno <p-sortIcon field="alunoNome" /></th>
          <th pSortableColumn="data">Data <p-sortIcon field="data" /></th>
          <th>Tipo</th>
          <th>Objetivo</th>
          <th>IMC</th>
          <th pSortableColumn="status">Status <p-sortIcon field="status" /></th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-av>
        <tr>
          <td>
            <div class="aluno-cell">
              <p-avatar [label]="getAvatar(av.alunoNome)" shape="circle" size="normal" />
              <span>{{ av.alunoNome }}</span>
            </div>
          </td>
          <td>{{ av.data }}</td>
          <td>{{ av.tipo }}</td>
          <td>{{ av.objetivo ?? '—' }}</td>
          <td>{{ av.imc ?? '—' }}</td>
          <td><p-tag [value]="av.status" [severity]="getSeverity(av.status)" /></td>
          <td>
            <div class="actions">
              <p-button
                icon="pi pi-eye"
                severity="info"
                [text]="true"
                [rounded]="true"
                pTooltip="Ver avaliação"
                (onClick)="verDetalhe(av)" />
              <p-button
                icon="pi pi-pencil"
                severity="warn"
                [text]="true"
                [rounded]="true"
                pTooltip="Editar"
                (onClick)="editar(av)" />
              <p-button
                icon="pi pi-trash"
                severity="danger"
                [text]="true"
                [rounded]="true"
                pTooltip="Excluir"
                (onClick)="confirmDelete(av)" />
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="empty-msg">Nenhuma avaliação encontrada.</td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>
