<p-toast />
<p-confirmDialog />

<div class="page-container">

  <div class="page-header">
    <div>
      <h2>Alunos</h2>
      <p>Gerencie seus alunos cadastrados</p>
    </div>
    <p-button label="Novo Aluno" icon="pi pi-plus" routerLink="/alunos/novo" />
  </div>

  <div class="card">
    <div class="table-toolbar">
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input
          pInputText
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Buscar aluno..." />
      </p-iconfield>
    </div>

    <p-table
      [value]="filteredAlunos"
      [paginator]="true"
      [rows]="10"
      [tableStyle]="{ 'min-width': '100%' }"
      styleClass="p-datatable-gridlines">

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">Aluno <p-sortIcon field="name" /></th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th pSortableColumn="status">Status <p-sortIcon field="status" /></th>
          <th>Última Avaliação</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-aluno>
        <tr>
          <td>
            <div class="aluno-cell">
              <p-avatar [label]="getAvatar(aluno.name)" shape="circle" size="normal" />
              <span class="aluno-nome">{{ aluno.name }}</span>
            </div>
          </td>
          <td>{{ aluno.email }}</td>
          <td>{{ aluno.cellPhone }}</td>
          <td><p-tag [value]="aluno.status" [severity]="getSeverity(aluno.status)" /></td>
          <td>{{ aluno.lastReview ?? '—' }}</td>
          <td>
            <div class="actions">
              <p-button
                icon="pi pi-eye"
                severity="info"
                [text]="true"
                [rounded]="true"
                pTooltip="Ver detalhes"
                (onClick)="verDetalhe(aluno)" />
              <p-button
                icon="pi pi-clipboard"
                severity="success"
                [text]="true"
                [rounded]="true"
                pTooltip="Nova avaliação"
                routerLink="/avaliacoes" />
              <p-button
                icon="pi pi-pencil"
                severity="warn"
                [text]="true"
                [rounded]="true"
                pTooltip="Editar"
                (onClick)="editar(aluno)" />
              <p-button
                icon="pi pi-trash"
                severity="danger"
                [text]="true"
                [rounded]="true"
                [disabled]="aluno.status === 'Inativo'"
                [pTooltip]="aluno.status === 'Inativo' ? 'Aluno inativo' : 'Excluir'"
                (onClick)="confirmDelete(aluno)" />
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="empty-msg">Nenhum aluno encontrado.</td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>
