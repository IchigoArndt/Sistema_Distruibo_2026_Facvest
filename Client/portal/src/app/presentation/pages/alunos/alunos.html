<div class="page-container">

  <div class="page-header">
    <div>
      <h2>Alunos</h2>
      <p>Gerencie seus alunos cadastrados</p>
    </div>
    <p-button label="Novo Aluno" icon="pi pi-plus" (onClick)="showDialog = true" />
  </div>

  <div class="card">
    <div class="table-toolbar">
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input
          pInputText
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Buscar aluno..." />
      </p-iconfield>
    </div>

    <p-table
      [value]="filteredAlunos"
      [paginator]="true"
      [rows]="10"
      [tableStyle]="{ 'min-width': '100%' }"
      styleClass="p-datatable-gridlines">

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="nome">Aluno <p-sortIcon field="nome" /></th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th pSortableColumn="status">Status <p-sortIcon field="status" /></th>
          <th>Última Avaliação</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-aluno>
        <tr>
          <td>
            <div class="aluno-cell">
              <p-avatar [label]="getAvatar(aluno.nome)" shape="circle" size="normal" />
              <span class="aluno-nome">{{ aluno.nome }}</span>
            </div>
          </td>
          <td>{{ aluno.email }}</td>
          <td>{{ aluno.telefone }}</td>
          <td><p-tag [value]="aluno.status" [severity]="getSeverity(aluno.status)" /></td>
          <td>{{ aluno.ultimaAvaliacao ?? '—' }}</td>
          <td>
            <div class="actions">
              <p-button icon="pi pi-eye"        severity="info"    [text]="true" [rounded]="true" pTooltip="Ver detalhes" />
              <p-button icon="pi pi-clipboard"  severity="success" [text]="true" [rounded]="true" pTooltip="Nova avaliação" />
              <p-button icon="pi pi-pencil"     severity="warn"    [text]="true" [rounded]="true" pTooltip="Editar" />
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="empty-msg">Nenhum aluno encontrado.</td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>

<p-dialog
  header="Novo Aluno"
  [(visible)]="showDialog"
  [modal]="true"
  [style]="{ width: '450px' }">
  <p style="color: var(--text-color-secondary)">Formulário de cadastro será implementado aqui.</p>
  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="showDialog = false" />
    <p-button label="Salvar" icon="pi pi-check" (onClick)="showDialog = false" />
  </ng-template>
</p-dialog>
