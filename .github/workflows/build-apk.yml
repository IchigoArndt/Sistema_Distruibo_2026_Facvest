name: Build APK

on:
  push:
    branches: [ lfc/apresentacao ]
  pull_request:
    branches: [ lfc/apresentacao ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.10.0'
        channel: 'stable'

    - name: Get dependencies
      run: cd Mobile/app && flutter pub get

    - name: Run tests
      run: cd Mobile/app && flutter test

    - name: Build APK
      run: cd Mobile/app && flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: Mobile/app/build/app/outputs/flutter-apk/app-release.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          ## Build #${{ github.run_number }}
          APK gerado automaticamente pelo GitHub Actions
        draft: false
        prerelease: false
        files: Mobile/app/build/app/outputs/flutter-apk/app-release.apk
      if: github.event_name == 'push' && github.ref == 'refs/heads/lfc/apresentacao'
